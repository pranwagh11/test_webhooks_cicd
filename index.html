<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple E-Commerce Demo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      display: flex;
      padding: 20px;
      gap: 20px;
    }

    .products {
      flex: 3;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    .card button {
      margin-top: 10px;
      padding: 8px;
      width: 100%;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .cart {
      flex: 1;
      background: white;
      padding: 15px;
      border-radius: 10px;
      height: fit-content;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 5px;
    }

    .remove {
      color: red;
      cursor: pointer;
    }

    .total {
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>Simple E-Commerce Demo</h1>
</header>

<div class="container">

  <!-- Products -->
  <div class="products" id="productList"></div>

  <!-- Cart -->
  <div class="cart">
    <h3>Cart</h3>
    <div id="cartItems"></div>
    <div class="total" id="totalPrice">Total: ₹0</div>
  </div>

</div>

<script>
  // Demo product data
  const products = [
    { id: 1, name: "Shoes", price: 1200, img: "https://picsum.photos/200?1" },
    { id: 2, name: "Watch", price: 2500, img: "https://picsum.photos/200?2" },
    { id: 3, name: "Headphones", price: 1800, img: "https://picsum.photos/200?3" },
    { id: 4, name: "Bag", price: 900, img: "https://picsum.photos/200?4" }
  ];

  let cart = [];

  const productList = document.getElementById("productList");
  const cartItems = document.getElementById("cartItems");
  const totalPrice = document.getElementById("totalPrice");

  // Show products
  function renderProducts() {
    productList.innerHTML = "";
    products.forEach(p => {
      productList.innerHTML += `
        <div class="card">
          <img src="${p.img}" />
          <h4>${p.name}</h4>
          <p>₹${p.price}</p>
          <button onclick="addToCart(${p.id})">Add to Cart</button>
        </div>
      `;
    });
  }

  // Add to cart
  function addToCart(id) {
    const product = products.find(p => p.id === id);
    cart.push(product);
    renderCart();
  }

  // Remove from cart
  function removeFromCart(index) {
    cart.splice(index, 1);
    renderCart();
  }

  // Render cart
  function renderCart() {
    cartItems.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
      total += item.price;

      cartItems.innerHTML += `
        <div class="cart-item">
          <span>${item.name} - ₹${item.price}</span>
          <span class="remove" onclick="removeFromCart(${index})">X</span>
        </div>
      `;
    });

    totalPrice.innerText = "Total: ₹" + total;
  }

  renderProducts();
</script>

</body>
</html>
