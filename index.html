<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mini E-Commerce with Login</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #e3f2fd, #f8f9fa);
  }

  /* HEADER */
  header {
    background: #111;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .auth button {
    padding: 8px 12px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    margin-left: 8px;
  }

  .login-btn { background: #28a745; color: white; }
  .logout-btn { background: crimson; color: white; }

  /* LOGIN MODAL */
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
  }

  .modal-content {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
  }

  .modal input {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
  }

  /* LAYOUT */
  .container {
    display: flex;
    padding: 20px;
    gap: 20px;
  }

  .products {
    flex: 3;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
  }

  .card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
    text-align: center;
  }

  .card:hover {
    transform: scale(1.03);
  }

  .card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
  }

  .card button {
    margin-top: 8px;
    padding: 8px;
    width: 100%;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  .add { background: green; color: white; }
  .view { background: #007bff; color: white; }

  /* CART */
  .cart {
    flex: 1;
    background: white;
    padding: 15px;
    border-radius: 12px;
    height: fit-content;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  .cart-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .remove {
    color: red;
    cursor: pointer;
  }

  /* PRODUCT MODAL */
  .product-modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
  }

  .product-box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
  }

  .close {
    margin-top: 10px;
    background: crimson;
    color: white;
    border: none;
    padding: 8px;
    width: 100%;
    cursor: pointer;
    border-radius: 6px;
  }
</style>
</head>

<body>

<header>
  <h2>🛒 Mini E-Commerce</h2>
  <div class="auth">
    <span id="userText">Guest</span>
    <button class="login-btn" onclick="openLogin()">Login</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">

  <div class="products" id="productList"></div>

  <div class="cart">
    <h3>Cart</h3>
    <div id="cartItems"></div>
    <h4 id="total">Total: ₹0</h4>
  </div>

</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <h3>Login</h3>
    <input id="username" placeholder="Username"/>
    <input id="password" type="password" placeholder="Password"/>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- PRODUCT DETAILS -->
<div class="product-modal" id="productModal">
  <div class="product-box">
    <h3 id="pname"></h3>
    <p id="pprice"></p>
    <p id="pdesc">Premium quality product with modern design.</p>
    <button class="close" onclick="closeProduct()">Close</button>
  </div>
</div>

<script>
const products = [
  { id: 1, name: "Shoes", price: 1200, img: "https://picsum.photos/200?1" },
  { id: 2, name: "Watch", price: 2500, img: "https://picsum.photos/200?2" },
  { id: 3, name: "Headphones", price: 1800, img: "https://picsum.photos/200?3" },
  { id: 4, name: "Bag", price: 900, img: "https://picsum.photos/200?4" }
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let user = localStorage.getItem("user");

const productList = document.getElementById("productList");
const cartItems = document.getElementById("cartItems");
const total = document.getElementById("total");
const userText = document.getElementById("userText");

function checkUser() {
  userText.innerText = user ? "Hi, " + user : "Guest";
}
checkUser();

/* LOGIN */
function openLogin() {
  document.getElementById("loginModal").style.display = "flex";
}

function login() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  if (u && p) {
    user = u;
    localStorage.setItem("user", u);
    document.getElementById("loginModal").style.display = "none";
    checkUser();
  }
}

function logout() {
  localStorage.removeItem("user");
  user = null;
  checkUser();
}

/* PRODUCTS */
function renderProducts() {
  productList.innerHTML = "";

  products.forEach(p => {
    productList.innerHTML += `
      <div class="card">
        <img src="${p.img}" />
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>

        <button class="add" onclick="addToCart(${p.id})">Add</button>
        <button class="view" onclick="viewProduct(${p.id})">View</button>
      </div>
    `;
  });
}

/* CART */
function addToCart(id) {
  if (!user) return alert("Please login first!");

  const item = products.find(p => p.id === id);
  cart.push(item);

  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function removeItem(i) {
  cart.splice(i,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function renderCart() {
  cartItems.innerHTML = "";
  let sum = 0;

  cart.forEach((c,i) => {
    sum += c.price;
    cartItems.innerHTML += `
      <div class="cart-item">
        ${c.name} - ₹${c.price}
        <span class="remove" onclick="removeItem(${i})">X</span>
      </div>
    `;
  });

  total.innerText = "Total: ₹" + sum;
}

/* PRODUCT DETAILS */
function viewProduct(id) {
  const p = products.find(x => x.id === id);
  document.getElementById("pname").innerText = p.name;
  document.getElementById("pprice").innerText = "Price: ₹" + p.price;
  document.getElementById("productModal").style.display = "flex";
}

function closeProduct() {
  document.getElementById("productModal").style.display = "none";
}

/* INIT */
renderProducts();
renderCart();
</script>

</body>
</html>
